name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['project_2/webui/**']
  workflow_dispatch:   # allow manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: project_2/webui/package-lock.json

      - name: Install dependencies
        run: cd project_2/webui && npm ci

      - name: Build
        run: cd project_2/webui && npm run build
        env:
          VITE_WS_ENDPOINT: ${{ secrets.VITE_WS_ENDPOINT || 'wss://hyupn8hi52.execute-api.us-west-2.amazonaws.com/prod' }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: project_2/webui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
